<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mumbai Indians SFL Performance</title>
    <meta
      name="description"
      content="IPL 2026 current performance tracker for the Mumbai Indians fantasy squad."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body data-page="performance">
    <div class="site-shell">
      <header class="topbar">
        <a class="brand" href="index.html" aria-label="Mumbai Indians SFL home">
          <span class="brand-mark">
            <img src="assets/images/team-logo.png" alt="Mumbai Indians team logo" />
          </span>
          <span class="brand-copy">
            <strong>#Mi family</strong>
            <span>SFL 2026</span>
          </span>
        </a>
        <div class="topbar-center">
          <strong>Mumbai Indians</strong>
          <span>SFL 2026</span>
        </div>
        <nav class="main-nav" aria-label="Primary">
          <a class="nav-link" href="index.html">Home</a>
          <a class="nav-link" href="players.html">Squad</a>
          <a class="nav-link is-active" href="performance.html">Performance</a>
        </nav>
      </header>

      <main>
        <section class="hero hero-players">
          <div class="hero-copy centered">
            <div class="hero-logo-wrap">
              <img class="hero-logo" src="assets/images/team-logo.png" alt="Mumbai Indians team logo" />
            </div>
            <p class="eyebrow">IPL 2026 Tracker</p>
            <h1>Current <span>Performance</span></h1>
          </div>
        </section>

        <section class="filter-bar">
          <div class="filter-group" role="tablist" aria-label="Filter performance by role">
            <button class="filter-chip is-active" data-filter="all" type="button">All</button>
            <button class="filter-chip" data-filter="batsman" type="button">Batsman</button>
            <button class="filter-chip" data-filter="bowler" type="button">Bowler</button>
            <button class="filter-chip" data-filter="all-rounder" type="button">All-Rounder</button>
            <button class="filter-chip" data-filter="wicket-keeper" type="button">Wicket-Keeper</button>
          </div>
        </section>

        <section class="performance-grid" id="performance-grid"></section>
      </main>
    </div>

    <script src="assets/js/data.js"></script>
    <script src="assets/js/main.js"></script>
  </body>
</html>
